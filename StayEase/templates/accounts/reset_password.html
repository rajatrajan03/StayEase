{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-icon">S</div>
        <span>StayEase</span>
    </div>

    <div class="auth-card">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new password below</p>

        {% if error %}
            <div class="alert-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label>New Password</label>
                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       required>
            </div>

            <div class="field">
                <label>Confirm Password</label>
                <input type="password"
                       name="confirm_password"
                       placeholder="••••••••"
                       required>
            </div>

            <button type="submit" class="primary-btn">
                Update Password →
            </button>
        </form>

    </div>

</div>
{% endblock %}
