{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-icon">S</div>
        <span>StayEase</span>
    </div>

    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your registered email to reset password</p>
        {% if messages %}
            {% for message in messages %}
                <div class="alert-success">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label>Email Address</label>
                <input type="email" name="email"
                       placeholder="name@company.com"
                       required>
            </div>

            <button type="submit" class="primary-btn">
                Send Reset Link →
            </button>
        </form>

        <p class="bottom-text">
            Remember your password?
            <a href="{% url 'login' %}">Back to Login</a>
        </p>

    </div>

</div>

{% endblock %}
